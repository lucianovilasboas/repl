services:
  api:
    build: .
    container_name: rpn-calculator-api
    ports:
      - "8000:8000"
    environment:
      - RPN_SECRET_KEY=${RPN_SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - RPN_DATABASE_URL=sqlite+aiosqlite:///./data/rpn_api.db
      - RPN_CORS_ORIGINS=["*"]
    volumes:
      - rpn_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  rpn_data:
